<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brute Force Visualiser</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--panel-bg);
            padding: 20px 40px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        h1 span {
            color: var(--danger);
        }

        .main-container {
            display: flex;
            flex: 1;
            padding: 30px 40px;
            gap: 30px;
            max-height: calc(100vh - 75px);
        }

        .config-panel {
            flex: 1;
            background-color: var(--panel-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 16px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .wordlist-container {
            flex: 1;
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .wordlist {
            flex: 1;
            background: #0b1120;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #334155;
            overflow-y: auto;
            max-height: 250px;
        }

        .wordlist h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .word-item {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: var(--text-muted);
            padding: 4px 0;
            border-bottom: 1px dashed #1e293b;
        }

        .target-info {
            background: #0b1120;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            margin-bottom: 25px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
        }

        .btn-start {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-start:hover {
            background-color: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .btn-start:disabled {
            background-color: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .terminal-panel {
            flex: 1.5;
            background-color: #000;
            border-radius: 12px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .terminal-header {
            background-color: #1e293b;
            padding: 10px 20px;
            display: flex;
            gap: 8px;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.r { background-color: #ff5f56; }
        .dot.y { background-color: #ffbd2e; }
        .dot.g { background-color: #27c93f; }

        .terminal-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            line-height: 1.6;
        }

        .log-line {
            margin-bottom: 4px;
            word-break: break-all;
        }

        .log-info { color: var(--accent); }
        .log-attempt { color: var(--text-muted); }
        .log-error { color: var(--danger); }
        .log-success { 
            color: var(--success); 
            font-size: 16px;
            font-weight: 600;
            padding: 10px 0;
            margin-top: 10px;
            border-top: 1px dashed var(--success);
            border-bottom: 1px dashed var(--success);
            text-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }
        
        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .badge-fail { background-color: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge-success { background-color: rgba(34, 197, 94, 0.2); color: var(--success); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--panel-bg); }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        .progress-bar-container {
            height: 6px;
            background: #1e293b;
            margin-top: -6px;
            width: 100%;
        }
        
        .progress-bar {
            height: 100%;
            background: var(--danger);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fas fa-spider"></i> <span>Brute</span>Visualiser</h1>
        <div style="color: var(--text-muted); font-size: 14px;">Live Attack Simulation</div>
    </header>

    <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="main-container">
        <div class="config-panel">
            <div class="section-title">Target Configuration</div>
            
            <div class="target-info">
                <span style="color: var(--text-muted)">TARGET_URL =</span> <span style="color: var(--success)">"http://127.0.0.1:8080/login"</span><br>
                <span style="color: var(--text-muted)">METHOD =</span> <span style="color: var(--accent)">POST</span><br>
                <span style="color: var(--text-muted)">PAYLOAD_TYPE =</span> <span style="color: var(--warning)">JSON</span>
            </div>

            <div class="section-title">Wordlists</div>
            
            <div class="wordlist-container">
                <div class="wordlist">
                    <h3>Usernames</h3>
                    <div id="usersList"></div>
                </div>
                <div class="wordlist">
                    <h3>Passwords</h3>
                    <div id="passwordsList"></div>
                </div>
            </div>

            <button class="btn-start" id="startBtn" onclick="startBruteforce()">
                Launch Attack Simulation
            </button>
        </div>

        <div class="terminal-panel">
            <div class="terminal-header">
                <div class="dot r"></div>
                <div class="dot y"></div>
                <div class="dot g"></div>
                <span style="margin-left: 10px; color: #64748b; font-size: 13px; font-family: 'Inter', sans-serif;">Live Feed</span>
            </div>
            <div class="terminal-body" id="terminal">
                <div class="log-line log-info">System ready. Awaiting command...</div>
            </div>
        </div>
    </div>

    <script>
        const usernames = ["patient001", "admin", "user", "patient", "test"];
        const passwords = [
            "123456", "password", "admin123", "letmein", "welcome",
            "monkey", "dragon", "master", "abc123", "qwerty",
            "hospital", "medicare", "patient", "secure123", "hospital@123"
        ];
        
        const totalCombinations = usernames.length * passwords.length;

        // Render lists
        document.getElementById('usersList').innerHTML = usernames.map(u => `<div class="word-item">${u}</div>`).join('');
        document.getElementById('passwordsList').innerHTML = passwords.map(p => `<div class="word-item">${"•".repeat(p.length)} (${p})</div>`).join('');

        const terminal = document.getElementById('terminal');
        const startBtn = document.getElementById('startBtn');
        const progressBar = document.getElementById('progressBar');

        function appendLog(text, type = 'info') {
            const div = document.createElement('div');
            div.className = `log-line log-${type}`;
            div.innerHTML = text;
            terminal.appendChild(div);
            // auto scroll
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function startBruteforce() {
            startBtn.disabled = true;
            startBtn.innerText = "ATTACK IN PROGRESS...";
            startBtn.style.animation = "pulse 1.5s infinite";
            
            terminal.innerHTML = '';
            progressBar.style.width = '0%';
            
            appendLog(`[*] Initializing attack vectors...`, 'info');
            appendLog(`[*] Target: /login API`, 'info');
            appendLog(`[*] Combinations loaded: ${totalCombinations}`, 'info');
            appendLog(`------------------------------------------------`, 'info');

            // Wait 1 second before starting visually
            await new Promise(r => setTimeout(r, 1000));
            
            let attempts = 0;
            let found = false;

            for (let u of usernames) {
                for (let p of passwords) {
                    if (found) break;
                    
                    attempts++;
                    progressBar.style.width = `${(attempts / totalCombinations) * 100}%`;
                    
                    const timestamp = new Date().toISOString().split('T')[1].substring(0, 8);
                    
                    try {
                        // Create visual delay to see the logs processing (because the server has 0.5s sleep anyway)
                        appendLog(`[${timestamp}] Trying payload: {"username": "${u}", "password": "***"}`, 'attempt');
                        
                        const response = await fetch('/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: u, password: p })
                        });
                        
                        const data = await response.json();
                        
                        if (data.status === 'success') {
                            appendLog(`[+] ACCESS GRANTED! Credential pair verified. <span class="status-badge badge-success">200 OK</span>`, 'info');
                            appendLog(`>>> VALID CREDENTIALS FOUND <<< <br> Username: ${u} <br> Password: ${p}`, 'success');
                            found = true;
                            
                            // Visual success cues
                            startBtn.innerText = "ATTACK SUCCESSFUL";
                            startBtn.style.backgroundColor = "var(--success)";
                            startBtn.style.animation = "none";
                            progressBar.style.backgroundColor = "var(--success)";
                            break;
                        } else {
                            // Find the last element we added and append failed badge
                            const lines = terminal.querySelectorAll('.log-attempt');
                            const lastLine = lines[lines.length - 1];
                            lastLine.innerHTML += ` <span class="status-badge badge-fail">401 DENIED</span>`;
                            lastLine.style.color = "#64748b";
                        }
                    } catch (error) {
                        appendLog(`[-] Connection Error: ${error.message}`, 'error');
                    }
                }
                if (found) break;
            }

            if (!found) {
                appendLog(`[-] Wordlists exhausted. No valid credentials found.`, 'error');
                startBtn.innerText = "ATTACK FAILED";
                startBtn.style.backgroundColor = "#475569";
                startBtn.style.animation = "none";
            }
        }
    </script>
</body>
</html>
